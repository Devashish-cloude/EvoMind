<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgricChain - Home Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .phone {
            width: 375px;
            height: 667px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        .status-bar {
            height: 24px;
            background: #4CAF50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            color: white;
            font-size: 12px;
        }
        .screen {
            height: calc(100% - 24px);
            background: #f5f5f5;
            overflow-y: auto;
            padding: 24px;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .app-title {
            font-size: 32px;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 16px;
            color: #757575;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-label {
            font-size: 14px;
            color: #757575;
            margin-bottom: 8px;
            display: block;
        }
        .input-field {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 18px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            border-color: #4CAF50;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-outline {
            background: white;
            border: 2px solid #4CAF50;
            color: #4CAF50;
        }
        .btn-outline:hover {
            background: #f1f8f4;
        }
        .btn-primary {
            background: #4CAF50;
            color: white;
            font-size: 20px;
            padding: 18px;
        }
        .btn-primary:hover {
            background: #388E3C;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>
        <div class="screen">
            <div class="header">
                <div class="app-title">AgricChain</div>
                <div class="subtitle">स्मार्ट फसल सलाहकार / Smart Harvest Advisor</div>
            </div>
            
            <div class="card">
                <div class="input-group">
                    <label class="input-label">फसल का नाम / Crop Name</label>
                    <input type="text" class="input-field" placeholder="e.g., Tomato, Wheat">
                </div>
                
                <div class="input-group">
                    <label class="input-label">मात्रा (किलो) / Quantity (kg)</label>
                    <input type="number" class="input-field" placeholder="e.g., 100">
                </div>
                
                <div class="input-group">
                    <label class="input-label">स्थान / Location</label>
                    <input type="text" class="input-field" placeholder="e.g., Delhi">
                </div>
                
                <button class="btn btn-outline">📍 स्वतः पता लगाएं / Auto Detect</button>
            </div>
            
            <button class="btn btn-primary" onclick="window.location.href='recommendation-screen.html'">
                सलाह पाएं / Get Recommendation
            </button>
        </div>
    </div>
</body>
</html>
